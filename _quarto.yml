  page-navigation: true
  navbar:
    background: primary
    logo: ""
    left:
      - text: "Start"
        file: start-here.qmd
      - text: "Tools & Setup"
        file: tools-setup.qmd
      - text: "Project Structure"
        file: reproducible-project-structure.qmd
      - text: "Best Practices"
        file: best-practices.qmd
      - text: "GitHub"
