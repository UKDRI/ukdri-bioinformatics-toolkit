      - text: "Tools & Setup"
        file: tools-setup.qmd
      - text: "Genomics Fundamentals"
        file: genomics-fundamentals.qmd
      - text: "Project Structure"
        file: reproducible-project-structure.qmd
      - text: "Best Practices"
        file: best-practices.qmd
      - text: "Institutional GitHub"
        file: institutional-github.qmd
      - text: "Tutorials & Workshops"
        file: tutorials-workshops.qmd
      - text: "Resources"
        file: resources.qmd
  
  page-footer:
    left: "UK Dementia Research Institute"
    right: 
      - icon: github
